<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Toby's Quest</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0a1a;
    --bg-mid: #0f172a;
    --bg-surface: #1e293b;
    --bg-card: #1a1a2e;
    --border: #334155;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --text-faint: #475569;
    --green: #22c55e;
    --gold: #f59e0b;
    --red: #ef4444;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --cyan: #06B6D4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 40%, var(--bg-card) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 32px;
    min-height: 100vh;
    min-height: 100dvh;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.1s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.96); }

  .font-display { font-family: 'Fredoka', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* Animations */
  @keyframes popIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes popScale { from { transform: scale(0.7); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .anim-slide-up { animation: slideUp 0.35s ease-out; }
  .anim-fade { animation: fadeIn 0.3s ease-out; }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    animation: popIn 0.3s ease-out;
  }
  .overlay-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, #16213e 100%);
    border-radius: 24px; padding: 40px 48px; text-align: center;
    animation: popScale 0.4s ease-out; max-width: 320px;
  }

  /* Sync indicator */
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .sync-ok { background: var(--green); }
  .sync-pending { background: var(--gold); animation: pulse 1.5s infinite; }
  .sync-error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }

  /* PIN screen */
  .pin-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; min-height: 100dvh;
    text-align: center; padding: 32px;
  }
  .pin-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px; font-weight: 700; text-align: center;
    letter-spacing: 12px; padding: 16px 24px;
    background: var(--bg-mid); border: 2px solid var(--border);
    border-radius: 16px; color: var(--text-primary);
    width: 220px; outline: none;
    -webkit-text-security: disc;
  }
  .pin-input:focus { border-color: var(--gold); }
  .pin-input::placeholder { letter-spacing: 8px; color: var(--text-muted); }

  /* Hide number input spinners */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// CONFIG -- edit these to change the app's behaviour
// ============================================================
const SYNC_URL = "https://tobys-quest-api.inman-tools.workers.dev/sync";
const REWARD_RATE_PENCE = 200;   // £2.00 per badge
const BADGE_THRESHOLD   = 30;    // minutes per badge

const CATEGORIES = [
  { id: "homework", label: "Homework",       icon: "📝", color: "#3B82F6", desc: "Assignments & coursework" },
  { id: "revision", label: "GCSE Revision",  icon: "📚", color: "#8B5CF6", desc: "Exam prep & study" },
  { id: "shower",   label: "Shower",         icon: "🚿", color: "#06B6D4", desc: "Daily hygiene" },
  { id: "bus",      label: "Bus to School",  icon: "🚌", color: "#F59E0B", desc: "Caught the bus" },
];

const MILESTONES = [
  { badges: 5,   title: "Getting Started",    icon: "⭐" },
  { badges: 15,  title: "Building Momentum",  icon: "🔥" },
  { badges: 30,  title: "Proper Grafter",     icon: "💪" },
  { badges: 50,  title: "Absolute Legend",     icon: "🏆" },
  { badges: 100, title: "The GOAT",           icon: "🐐" },
];

const DEFAULT_STATE = {
  totalBadges: 0, totalMinutes: 0, balancePence: 0, withdrawn: 0, logs: [],
  categoryStats: {
    homework: { minutes: 0, badges: 0, sessions: 0 },
    revision: { minutes: 0, badges: 0, sessions: 0 },
    bus:      { minutes: 0, badges: 0, sessions: 0 },
    shower:   { minutes: 0, badges: 0, sessions: 0 },
  },
};

// ============================================================
// HELPERS
// ============================================================
// Safe localStorage wrappers -- school Chromebooks may block storage entirely
function safeGetItem(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function safeSetItem(key, value) {
  try { localStorage.setItem(key, value); } catch {}
}
function safeRemoveItem(key) {
  try { localStorage.removeItem(key); } catch {}
}

const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
};

function formatMoney(pence) { return `£${(pence / 100).toFixed(2)}`; }

function formatBadges(n) {
  const whole = Math.floor(n);
  const hasHalf = n % 1 !== 0;
  if (whole === 0 && hasHalf) return "½";
  if (hasHalf) return `${whole}½`;
  return String(whole);
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function timeAgo(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function hasDoneToday(logs, categoryId) {
  const today = todayKey();
  return logs.some(log => {
    if (log.category !== categoryId) return false;
    const d = new Date(log.timestamp);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}` === today;
  });
}

// ============================================================
// SYNC ENGINE
// ============================================================
class SyncEngine {
  constructor(pin) {
    this.pin = pin;
    this.syncStatus = "pending"; // ok | pending | error
    this.listeners = [];
  }

  onStatusChange(fn) { this.listeners.push(fn); }
  _notify() { this.listeners.forEach(fn => fn(this.syncStatus)); }

  async load() {
    try {
      const res = await fetch(`${SYNC_URL}?pin=${encodeURIComponent(this.pin)}`);
      if (res.status === 401) return { error: "wrong_pin" };
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      this.syncStatus = "ok"; this._notify();
      if (data && data.totalBadges !== undefined) {
        return { state: { ...DEFAULT_STATE, ...data, categoryStats: { ...DEFAULT_STATE.categoryStats, ...data.categoryStats } } };
      }
      return { state: { ...DEFAULT_STATE } };
    } catch (e) {
      console.error("Sync load failed:", e);
      this.syncStatus = "error"; this._notify();
      // Fall back to localStorage
      try {
        const local = safeGetItem("toby-quest-state");
        if (local) return { state: { ...DEFAULT_STATE, ...JSON.parse(local) } };
      } catch {}
      return { state: { ...DEFAULT_STATE } };
    }
  }

  async save(state) {
    // Always save locally as backup
    try { safeSetItem("toby-quest-state", JSON.stringify(state)); } catch {}

    this.syncStatus = "pending"; this._notify();
    try {
      const res = await fetch(`${SYNC_URL}?pin=${encodeURIComponent(this.pin)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(state),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      this.syncStatus = "ok"; this._notify();
    } catch (e) {
      console.error("Sync save failed:", e);
      this.syncStatus = "error"; this._notify();
    }
  }
}

// ============================================================
// APP
// ============================================================
class App {
  constructor(container) {
    this.root = container;
    this.state = { ...DEFAULT_STATE };
    this.sync = null;
    this.pin = null;
    this.timerInterval = null;
    this.timerStartedAt = null;    // wall-clock timestamp when timer started/resumed
    this.timerPausedElapsed = 0;   // seconds accumulated before current run
    this.timerRunning = false;
    this.timerCategory = null;
    this.confirmingDone = false;

    // Check for stored PIN
    this.pin = safeGetItem("toby-quest-pin") || null;
    if (this.pin) {
      this.initSync();
    } else {
      this.renderPinScreen();
    }
  }

  async initSync() {
    this.sync = new SyncEngine(this.pin);
    this.sync.onStatusChange(() => this.updateSyncDot());
    this.renderLoading();

    const result = await this.sync.load();
    if (result.error === "wrong_pin") {
      safeRemoveItem("toby-quest-pin");
      this.pin = null;
      this.renderPinScreen("Wrong PIN. Try again.");
      return;
    }
    this.state = result.state;
    safeSetItem("toby-quest-pin", this.pin);
    this.renderHome();
  }

  save() {
    if (this.sync) this.sync.save(this.state);
  }

  updateSyncDot() {
    const dot = $(".sync-dot", this.root);
    if (!dot) return;
    dot.className = `sync-dot sync-${this.sync.syncStatus}`;
    const label = $(".sync-label", this.root);
    if (label) label.textContent = this.sync.syncStatus === "ok" ? "Synced" : this.sync.syncStatus === "pending" ? "Syncing..." : "Offline";
  }

  // ---- SCREENS ----

  renderLoading() {
    this.root.innerHTML = "";
    this.root.appendChild(el("div", { style: {
      display: "flex", alignItems: "center", justifyContent: "center",
      minHeight: "100vh", fontFamily: "'Fredoka', sans-serif", fontSize: "22px", color: "#e2e8f0",
    }}, "Loading..."));
  }

  renderPinScreen(errorMsg = null) {
    this.root.innerHTML = "";
    const screen = el("div", { className: "pin-screen" },
      el("div", { style: { fontSize: "64px", marginBottom: "16px" }}, "🏅"),
      el("div", { className: "font-display", style: {
        fontSize: "28px", fontWeight: "700", marginBottom: "8px",
        background: "linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6)",
        WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
      }}, "Toby's Quest"),
      el("div", { style: { color: "#64748b", fontSize: "14px", marginBottom: "32px" }}, "Enter your PIN to continue"),
    );

    if (errorMsg) {
      screen.appendChild(el("div", { style: {
        color: "#ef4444", fontSize: "14px", marginBottom: "16px", fontWeight: "600",
      }}, errorMsg));
    }

    const input = el("input", {
      className: "pin-input",
      type: "tel",
      maxlength: "6",
      placeholder: "····",
      inputmode: "numeric",
      autocomplete: "off",
    });

    const btn = el("button", {
      style: {
        marginTop: "24px", padding: "14px 48px", borderRadius: "14px", border: "none",
        background: "#22c55e", color: "#fff", fontSize: "16px", fontWeight: "600",
        cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
      },
      onClick: () => {
        const v = input.value.trim();
        if (v.length >= 4) {
          this.pin = v;
          this.initSync();
        }
      },
    }, "Continue");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") btn.click();
    });

    screen.appendChild(input);
    screen.appendChild(btn);
    this.root.appendChild(screen);
    setTimeout(() => input.focus(), 100);
  }

  renderHome() {
    this.root.innerHTML = "";
    const container = el("div");

    // Header
    container.appendChild(this._buildHeader());

    // Balance card
    container.appendChild(this._buildBalanceCard());

    // Category buttons
    const section = el("div", { style: { marginBottom: "20px" }});
    section.appendChild(el("div", { style: {
      color: "#94a3b8", fontSize: "13px", fontWeight: "600",
      textTransform: "uppercase", letterSpacing: "1px", marginBottom: "12px",
    }}, "Log activity"));

    const catList = el("div", { style: { display: "flex", flexDirection: "column", gap: "10px" }});
    const dailyCategories = ["shower", "bus"];

    CATEGORIES.forEach(cat => {
      const isDaily = dailyCategories.includes(cat.id);
      const done = isDaily && hasDoneToday(this.state.logs, cat.id);
      const btn = el("button", {
        style: {
          display: "flex", alignItems: "center", gap: "16px",
          background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)",
          border: `1px solid ${done ? "#22c55e44" : cat.color + "33"}`,
          borderRadius: "16px", padding: "18px 20px",
          cursor: done ? "default" : "pointer",
          width: "100%", textAlign: "left",
          opacity: done ? "0.7" : "1",
        },
        onClick: () => {
          if (done) return;
          if (cat.id === "shower") this.renderDailyConfirm("shower");
          else if (cat.id === "bus") this.renderDailyConfirm("bus");
          else this.renderModeSelect(cat.id);
        },
      },
        el("div", { style: {
          width: "48px", height: "48px", borderRadius: "14px",
          background: done ? "#22c55e22" : `${cat.color}22`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: "24px", flexShrink: "0",
        }}, done ? "✅" : cat.icon),
        el("div", { style: { flex: "1" }},
          el("div", { style: { fontWeight: "600", fontSize: "16px", color: "#e2e8f0" }}, cat.label),
          el("div", { style: { fontSize: "13px", color: "#64748b" }}, done ? "Done for today" : cat.desc),
        ),
        el("div", { style: { textAlign: "right", flexShrink: "0" }},
          el("div", { style: { fontWeight: "700", color: cat.color, fontSize: "15px" }},
            `🏅 ${formatBadges(this.state.categoryStats[cat.id].badges)}`),
          ...(!isDaily ? [el("div", { style: { fontSize: "12px", color: "#64748b" }},
            `${Math.round(this.state.categoryStats[cat.id].minutes / 60 * 10) / 10}h total`)] : []),
        ),
      );
      catList.appendChild(btn);
    });

    section.appendChild(catList);
    container.appendChild(section);

    // Action buttons
    const actions = el("div", { style: { display: "flex", gap: "10px", marginBottom: "20px" }});
    actions.appendChild(el("button", {
      style: {
        flex: "1", padding: "14px 16px", borderRadius: "14px", border: "1px solid #334155",
        background: "#1e293b", color: "#94a3b8", fontSize: "14px", fontWeight: "600", cursor: "pointer",
      },
      onClick: () => this.renderHistory(),
    }, "📋 History"));

    const canWithdraw = this.state.balancePence >= 100;
    actions.appendChild(el("button", {
      style: {
        flex: "1", padding: "14px 16px", borderRadius: "14px", border: "1px solid #334155",
        background: "#1e293b", color: canWithdraw ? "#94a3b8" : "#475569",
        fontSize: "14px", fontWeight: "600",
        cursor: canWithdraw ? "pointer" : "default",
        opacity: canWithdraw ? "1" : "0.5",
      },
      onClick: () => { if (canWithdraw) this.renderWithdraw(); },
    }, "💰 Cash out"));
    container.appendChild(actions);

    // Recent logs
    if (this.state.logs.length > 0) {
      const recent = el("div");
      recent.appendChild(el("div", { style: {
        color: "#94a3b8", fontSize: "13px", fontWeight: "600",
        textTransform: "uppercase", letterSpacing: "1px", marginBottom: "10px",
      }}, "Recent"));
      this.state.logs.slice(0, 3).forEach(log => {
        recent.appendChild(this._buildLogRow(log));
      });
      container.appendChild(recent);
    }

    // Footer
    container.appendChild(el("div", { style: {
      textAlign: "center", color: "#334155", fontSize: "11px", marginTop: "32px",
    }}, "£2 per badge · 30 min study = 1 badge · shower = 1 badge · bus = ½ badge"));

    this.root.appendChild(container);
  }

  renderModeSelect(categoryId) {
    this.root.innerHTML = "";
    const cat = CATEGORIES.find(c => c.id === categoryId);
    const container = el("div");
    container.appendChild(this._buildHeader());
    container.appendChild(this._buildBalanceCard());

    const panel = el("div", { className: "anim-slide-up" });
    panel.appendChild(this._backBtn(() => this.renderHome()));

    panel.appendChild(el("div", { className: "font-display", style: {
      fontSize: "20px", color: "#e2e8f0", textAlign: "center", marginBottom: "16px",
    }}, "How do you want to track?"));

    const makeBtn = (icon, title, desc, onClick) => el("button", {
      style: {
        padding: "20px 24px", borderRadius: "16px", border: "1px solid #334155",
        background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)",
        color: "#e2e8f0", fontSize: "16px", fontWeight: "600",
        cursor: "pointer", textAlign: "left", width: "100%", marginBottom: "12px",
      },
      onClick,
    },
      el("span", {}, `${icon} ${title}`),
      el("div", { style: { fontSize: "13px", color: "#64748b", fontWeight: "400", marginTop: "4px" }}, desc),
    );

    panel.appendChild(makeBtn("⏱", "Use timer", "Start a live timer while you work", () => this.renderTimer(categoryId)));
    panel.appendChild(makeBtn("✏️", "Quick log", "Already done? Log the time manually", () => this.renderQuickLog(categoryId)));

    container.appendChild(panel);
    this.root.appendChild(container);
  }

  renderTimer(categoryId) {
    const cat = CATEGORIES.find(c => c.id === categoryId);
    this.timerStartedAt = Date.now();
    this.timerPausedElapsed = 0;
    this.timerRunning = true;
    this.timerCategory = categoryId;
    this.confirmingDone = false;

    // Helper: get total elapsed seconds from wall clock
    const getElapsed = () => {
      if (this.timerRunning) {
        return this.timerPausedElapsed + Math.floor((Date.now() - this.timerStartedAt) / 1000);
      }
      return this.timerPausedElapsed;
    };

    this.root.innerHTML = "";
    const container = el("div");
    container.appendChild(this._buildHeader());

    const panel = el("div", { className: "anim-slide-up", style: {
      background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)",
      borderRadius: "20px", padding: "32px", textAlign: "center",
      border: `2px solid ${cat.color}33`,
    }});

    panel.appendChild(el("div", { style: { fontSize: "48px", marginBottom: "8px" }}, cat.icon));
    panel.appendChild(el("div", { className: "font-display", style: {
      fontSize: "20px", color: "#e2e8f0", marginBottom: "24px",
    }}, `${cat.label} in progress`));

    const display = el("div", { className: "font-mono", id: "timer-display", style: {
      fontSize: "56px", fontWeight: "700", color: cat.color, marginBottom: "16px", letterSpacing: "2px",
    }}, "00:00");

    const barOuter = el("div", { style: {
      background: "#1e293b", borderRadius: "12px", height: "12px",
      marginBottom: "8px", overflow: "hidden", border: "1px solid #334155",
    }});
    const barInner = el("div", { id: "timer-bar", style: {
      height: "100%", borderRadius: "12px",
      background: `linear-gradient(90deg, ${cat.color}, ${cat.color}cc)`,
      width: "0%", transition: "width 1s linear",
    }});
    barOuter.appendChild(barInner);

    const info = el("div", { id: "timer-info", style: {
      color: "#64748b", fontSize: "13px", marginBottom: "24px",
    }}, `Next badge at ${BADGE_THRESHOLD} mins`);

    panel.appendChild(display);
    panel.appendChild(barOuter);
    panel.appendChild(info);

    // Buttons
    const buttons = el("div", { style: { display: "flex", gap: "12px", justifyContent: "center", flexWrap: "wrap" }});

    const pauseBtn = el("button", {
      id: "timer-pause",
      style: {
        padding: "12px 28px", borderRadius: "12px", border: "none",
        background: "#334155", color: "#fff", fontSize: "15px", fontWeight: "600", cursor: "pointer",
      },
      onClick: () => {
        if (this.timerRunning) {
          // Pause: capture elapsed so far
          this.timerPausedElapsed = getElapsed();
          this.timerRunning = false;
        } else {
          // Resume: reset start timestamp
          this.timerStartedAt = Date.now();
          this.timerRunning = true;
        }
        pauseBtn.textContent = this.timerRunning ? "⏸ Pause" : "▶ Resume";
        pauseBtn.style.background = this.timerRunning ? "#334155" : cat.color;
      },
    }, "⏸ Pause");

    const doneBtn = el("button", {
      id: "timer-done",
      style: {
        padding: "12px 28px", borderRadius: "12px", border: "none",
        background: "#22c55e", color: "#fff", fontSize: "15px", fontWeight: "600", cursor: "pointer",
      },
      onClick: () => {
        const elapsed = getElapsed();
        if (elapsed < 60 && !this.confirmingDone) {
          this.confirmingDone = true;
          doneBtn.textContent = "Tap again to confirm";
          setTimeout(() => { this.confirmingDone = false; doneBtn.textContent = "✓ Done"; }, 3000);
          return;
        }
        this._stopTimer();
        this.logActivity(categoryId, Math.floor(elapsed / 60));
      },
    }, "✓ Done");

    const cancelBtn = el("button", {
      style: {
        padding: "12px 28px", borderRadius: "12px", border: "none",
        background: "#991b1b", color: "#fff", fontSize: "15px", fontWeight: "600", cursor: "pointer",
      },
      onClick: () => { this._stopTimer(); this.renderHome(); },
    }, "✕ Cancel");

    buttons.appendChild(pauseBtn);
    buttons.appendChild(doneBtn);
    buttons.appendChild(cancelBtn);
    panel.appendChild(buttons);
    container.appendChild(panel);
    this.root.appendChild(container);

    // Update display every second -- reads wall clock, so survives screen sleep
    const updateDisplay = () => {
      const seconds = getElapsed();
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      display.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

      const earned = Math.floor(seconds / (BADGE_THRESHOLD * 60));
      const inCurrent = seconds % (BADGE_THRESHOLD * 60);
      const pct = (inCurrent / (BADGE_THRESHOLD * 60)) * 100;
      barInner.style.width = `${pct}%`;

      let infoText = "";
      if (earned > 0) infoText = `<span style="color:#f59e0b">🏅 x${earned} earned so far</span> · `;
      infoText += `Next badge at ${BADGE_THRESHOLD * (earned + 1)} mins`;
      info.innerHTML = infoText;
    };

    this.timerInterval = setInterval(updateDisplay, 1000);

    // Catch up immediately when tab/screen becomes visible again
    document.addEventListener("visibilitychange", this._visHandler = () => {
      if (!document.hidden) updateDisplay();
    });
  }

  _stopTimer() {
    if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    if (this._visHandler) { document.removeEventListener("visibilitychange", this._visHandler); this._visHandler = null; }
    this.timerRunning = false;
  }

  // ---- CORE LOGIC ----

  logActivity(categoryId, minutes) {
    const isShower = categoryId === "shower";
    const isBus = categoryId === "bus";
    const isQuickTap = isShower || isBus;

    let badges, earnedPence;
    if (isBus) {
      badges = 0.5;
      earnedPence = REWARD_RATE_PENCE / 2; // £1.00
    } else if (isShower) {
      badges = 1;
      earnedPence = REWARD_RATE_PENCE;
    } else {
      badges = Math.floor(minutes / BADGE_THRESHOLD);
      earnedPence = badges * REWARD_RATE_PENCE;
    }

    if (badges === 0 && !isQuickTap) {
      this.showNoBadgePopup(minutes);
      this.renderHome();
      return;
    }

    const now = Date.now();

    this.state.totalBadges += badges;
    this.state.totalMinutes += isQuickTap ? 0 : minutes;
    this.state.balancePence += earnedPence;
    this.state.logs = [{
      id: now, category: categoryId, minutes: isQuickTap ? 0 : minutes,
      badges, earned: earnedPence, timestamp: now,
    }, ...this.state.logs].slice(0, 200);

    const cs = this.state.categoryStats[categoryId];
    cs.minutes += isQuickTap ? 0 : minutes;
    cs.badges += badges;
    cs.sessions += 1;

    this.save();
    this.renderHome();
    if (isBus) {
      this.showHalfBadgePopup();
    } else {
      this.showBadgePopup(badges);
    }
  }

  _buildBalanceCard() {
    const card = el("div", { className: "anim-slide-up", style: {
      background: "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)",
      borderRadius: "20px", padding: "24px 28px", marginBottom: "20px", border: "1px solid #334155",
    }});

    const top = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start" }});
    const left = el("div");
    left.appendChild(el("div", { style: { color: "#64748b", fontSize: "12px", fontWeight: "600", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "4px" }}, "Balance"));
    left.appendChild(el("div", { className: "font-display", style: { fontSize: "36px", fontWeight: "700", color: "#22c55e" }}, formatMoney(this.state.balancePence)));
    const right = el("div", { style: { textAlign: "right" }});
    right.appendChild(el("div", { className: "font-display", style: { color: "#f59e0b", fontSize: "22px", fontWeight: "700" }}, `🏅 ${formatBadges(this.state.totalBadges)}`));
    right.appendChild(el("div", { style: { color: "#64748b", fontSize: "12px" }}, "badges total"));
    top.appendChild(left);
    top.appendChild(right);
    card.appendChild(top);

    const currentMs = MILESTONES.filter(m => this.state.totalBadges >= m.badges).pop();
    const nextMs = MILESTONES.find(m => this.state.totalBadges < m.badges);

    if (nextMs) {
      const progress = el("div", { style: { marginTop: "16px" }});
      const labels = el("div", { style: { display: "flex", justifyContent: "space-between", fontSize: "12px", color: "#64748b", marginBottom: "6px" }});
      labels.appendChild(el("span", {}, currentMs ? `${currentMs.icon} ${currentMs.title}` : "Just starting"));
      labels.appendChild(el("span", {}, `${nextMs.icon} ${nextMs.title} (${nextMs.badges})`));
      progress.appendChild(labels);
      const barOuter = el("div", { style: { background: "#0f172a", borderRadius: "8px", height: "8px", overflow: "hidden" }});
      barOuter.appendChild(el("div", { style: {
        height: "100%", borderRadius: "8px",
        background: "linear-gradient(90deg, #f59e0b, #ef4444)",
        width: `${(this.state.totalBadges / nextMs.badges) * 100}%`, transition: "width 0.5s ease",
      }}));
      progress.appendChild(barOuter);
      card.appendChild(progress);
    } else if (currentMs) {
      card.appendChild(el("div", { style: { marginTop: "12px", color: "#f59e0b", fontSize: "14px", fontWeight: "600" }},
        `${currentMs.icon} ${currentMs.title} -- max rank achieved!`));

    return card;

  _buildLogRow(log, showDate = false) {
    const cat = CATEGORIES.find(c => c.id === log.category);
    const row = el("div", { style: {
      display: "flex", alignItems: "center", gap: "12px",
      padding: "10px 0", borderBottom: "1px solid #1e293b",
    }});
    row.appendChild(el("div", { style: { fontSize: "20px" }}, cat ? cat.icon : "💸"));
    const mid = el("div", { style: { flex: "1" }});
    const titleParts = cat ? cat.label : "Cash out";
    const extra = log.minutes > 0 ? ` · ${log.minutes}m` : "";
    mid.appendChild(el("div", { style: { fontSize: "14px", fontWeight: "500" },
      html: titleParts + (log.badges > 0 ? ` <span style="color:#f59e0b">· 🏅${log.badges === 0.5 ? "½" : "x" + log.badges}</span>` : "") + `<span style="color:#64748b">${extra}</span>`,
    }));
    const timeText = showDate
      ? new Date(log.timestamp).toLocaleDateString("en-GB", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })
      : timeAgo(log.timestamp);
    mid.appendChild(el("div", { style: { fontSize: "12px", color: "#64748b" }}, timeText));
    row.appendChild(mid);
    row.appendChild(el("div", { style: {
      fontSize: "14px", fontWeight: "600",
      color: log.earned >= 0 ? "#22c55e" : "#ef4444",
    }}, `${log.earned >= 0 ? "+" : ""}${formatMoney(Math.abs(log.earned))}`));
    return row;
  }

  _backBtn(onClick) {
    return el("button", {
      style: {
